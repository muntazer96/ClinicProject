name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore backend
        run: dotnet restore Clinic_Booking/Clinic_Booking.sln
      - name: Test backend
        run: dotnet test Clinic_Booking/Clinic_Booking.sln --no-restore --verbosity normal

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Clinic_Admin/package-lock.json
      - name: Install admin dependencies
        working-directory: Clinic_Admin
        run: npm ci
      - name: Build admin
        working-directory: Clinic_Admin
        run: npm run build

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Flutter dependencies
        working-directory: Clinic_App
        run: flutter pub get
      - name: Analyze Flutter
        working-directory: Clinic_App
        run: flutter analyze
      - name: Test Flutter
        working-directory: Clinic_App
        run: flutter test
